gain-proportional-tooltip=Реагує на поточну помилку. Більші значення пришвидшують реакцію, але можуть викликати перерегулювання чи коливання.
gain-integral-tooltip=Усуває невеликі, тривалі відхилення. Більші значення прибирають постійну похибку, але можуть викликати повільні коливання.
gain-derivative-tooltip=Реагує на швидкість зміни помилки і наперед гальмує різкі зміни у системі. Зменшує перерегулювання, але посилює вплив шуму.
term-p=Пропорційна
term-i=Інтегральна
term-d=Диференційна
term-panel-title=Складові ПІД
terms-button-tooltip=Складові ПІД
anti-windup-limit=Обмеження інтегратора
anti-windup-limit-tooltip=Обмежує накопичену інтегральну складову цим значенням, щоб вона не розганялася під час насичення виходу. Менші значення дозволяють швидше відновлюватися після насичення, більші — забезпечують сильнішу інтегральну дію на невеликих, але стійких відхиленнях.
status-tuning=Налаштування
autotune=Налаштувати автоматично
autotune-tooltip=__REMARK_COLOR_BEGIN__Увага! Перезаписує поточні Kp, Ki, Kd.__REMARK_COLOR_END__\nВиконує автоналаштування коефіцієнтів методом релейного зворотного зв'язку навколо заданої уставки та застосовує отримані значення.
autotune-cancel=Скасувати
autotune-cancel-tooltip=Зупиняє автоналаштування. Kp, Ki, Kd зберігають свої поточні значення.
autotune-target=Ціль автоналаштування
autotune-target-tooltip=Уставка, навколо якої автоналаштування утримуватиме регульовану змінну під час вимірювання. Оберіть значення ближче до середини робочого діапазону змінної, щоб вона могла коливатися по обидва боки від нього.
autotune-bipolar=Дозволити від'ємний вихід
autotune-bipolar-tooltip=Дозволяє автоналаштуванню подавати від'ємний вихід під час вимірювання.\n__REMARK_COLOR_BEGIN__Увага: якщо логічна мережа ігнорує або обрізає від'ємні значення, автоналаштування не зможе завершитися й не поверне жодних коефіцієнтів.__REMARK_COLOR_END__\nЯкщо залишити вимкненим, автоналаштування працюватиме й на двонапрямних мережах — просто використовуватиме лише додатну половину діапазону.
autotune-rule=Правило автоналаштування
autotune-rule-tooltip=Різні правила по-різному співвідносять швидкість реакції та перерегулювання. Якщо не впевнені, оберіть «Astrom-Hagglund: AMIGO PID» або «Ziegler-Nichols: No overshoot».
