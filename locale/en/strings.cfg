anti-windup-limit-tooltip=Caps the accumulated integral term at this value so it can't run away while the output is saturated. Lower values recover faster from saturation; higher values allow more integral action for small persistent errors.
status-tuning=Tuning
autotune=Auto-tune
autotune-tooltip=__REMARK_COLOR_BEGIN__Warning! Overwrites current Kp, Ki, Kd.__REMARK_COLOR_END__\nRuns a relay-feedback autotune around the target setpoint and applies the resulting gains.
autotune-cancel=Cancel
autotune-cancel-tooltip=Stops the running auto-tune. Kp, Ki, Kd keep their current values.
autotune-failed-no-oscillation=Auto-tune failed: no sustained oscillation.
autotune-target=Auto-tune target
autotune-target-tooltip=Setpoint the auto-tuner holds PV around while measuring. Pick a value near the middle of the PV's operating range so it can swing freely on both sides.
autotune-bipolar=Allow negative output
autotune-bipolar-tooltip=Lets the auto-tuner command negative output during measurement.\n__REMARK_COLOR_BEGIN__Warning: if the downstream circuit ignores or clips negative output, enabling this will make auto-tuning fail without producing any gains.__REMARK_COLOR_END__\nLeaving it off still works on bidirectional circuits, just using only the positive half of the range.
autotune-rule=Auto-tune rule
autotune-rule-tooltip=Different rules trade off response speed against overshoot. If unsure, start with "Astrom-Hagglund: AMIGO PID" or "Ziegler-Nichols: No overshoot".
